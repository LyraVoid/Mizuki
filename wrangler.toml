# Cloudflare Pages 配置文件
# 文档: https://developers.cloudflare.com/pages/platform/wrangler-configuration/

name = "mizuki"
compatibility_date = "2024-01-01"

# 构建配置
[build]
command = "pnpm run build"
output_directory = "dist"

# 环境变量
[vars]
NODE_VERSION = "20"

# 构建环境变量
[env.production.vars]
NODE_ENV = "production"
