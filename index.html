<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizuki - 一个演示网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 800px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #666;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        
        .feature:hover {
            transform: translateY(-5px);
        }
        
        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Mizuki</h1>
        <p>一个使用 Astro 构建的现代博客主题</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🚀</div>
                <h3>快速</h3>
                <p>基于 Astro 的极速性能</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <h3>美观</h3>
                <p>现代化的 Material Design 设计</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <h3>响应式</h3>
                <p>完美适配各种设备</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>功能丰富</h3>
                <p>内置多种实用功能</p>
            </div>
        </div>
        
        <a href="https://github.com/mcqa2580/Mizuki" class="btn">查看 GitHub 仓库</a>
        
        <footer>
            <p>© 2024 Mizuki. Built with ❤️ using Astro.</p>
        </footer>
    </div>
</body>
</html>
